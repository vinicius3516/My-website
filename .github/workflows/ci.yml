name: Auto Deploy S3
on:
    push:
        branches:
            - main
            - feature/*
jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v3

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                python-version: '3.11'

            - name: Pip Upgrade
              run: |
                pip install --upgrade pip

            - name: Install mkdocs
              run: |
                pip install mkdocs
                pip install mkdocs-material
                pip install mkdocs-minify-plugin

            - name: Verification
              run: |
                mkdocs --version